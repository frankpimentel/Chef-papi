<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chef Papi</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 40px 32px;
    text-align: center;
    max-width: 320px;
    width: 100%;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  h2 { font-size: 22px; color: #1a1a1a; margin-bottom: 32px; }
  .btn {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: none;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 12px;
  }
  .yes { background: #1a7a4a; color: white; }
  .no  { background: #f0f0f0; color: #666; }
  .result { display: none; font-size: 20px; font-weight: 700; margin-top: 8px; }
  .ok { color: #1a7a4a; }
  .cancel { color: #999; }
</style>
</head>
<body>
<div class="card">
  <h2>Salio bien?</h2>
  <button class="btn yes" onclick="respond(true)">Si</button>
  <button class="btn no"  onclick="respond(false)">No</button>
  <div class="result ok"     id="ok">Listo!</div>
  <div class="result cancel" id="cancel">Ok, cancelado.</div>
</div>
<script>
  const p      = new URLSearchParams(window.location.search);
  const order  = p.get('order') || '0';
  const server = p.get('server') || 'https://chef-papi-production.up.railway.app';
  const amount = p.get('amount') || '0';

  function respond(yes) {
    document.querySelectorAll('.btn').forEach(b => b.style.display = 'none');
    if (yes) {
      fetch(server + '/payment-confirm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ order_id: parseInt(order), status: 'APPROVED', reference: 'TEST-' + Date.now() })
      }).catch(() => {});
      document.getElementById('ok').style.display = 'block';
    } else {
      document.getElementById('cancel').style.display = 'block';
    }
  }
</script>
</body>
</html>
